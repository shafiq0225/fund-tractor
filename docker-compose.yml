services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SQL_PASSWORD} -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    # Mount init script
    volumes:
      - ./init-db.sql:/init-db.sql
    command: 
      - /bin/bash
      - -c 
      - |
        # Start SQL Server in the background
        /opt/mssql/bin/sqlservr &
        # Wait for SQL Server to start
        sleep 30
        # Run initialization script
        /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$${SQL_PASSWORD}" -i /init-db.sql
        # Wait for SQL Server process
        wait