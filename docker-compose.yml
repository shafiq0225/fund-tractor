version: '3.8'

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - sql
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql;Database=FundTrackrDB;User=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
    restart: unless-stopped
    ports:
      - "8080:8080"
    # ADD THIS:
    labels:
      - "railway.service.port=8080"